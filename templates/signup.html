{% extends 'base.html' %}
{% block content %}

<div class="auth-wrapper">

    <div class="auth-card">

        <h2 class="auth-title">Create Account</h2>

        <form method="POST" class="auth-form">

            <input type="text" name="name" class="form-control auth-input" placeholder="Full Name" required>

            <input type="email" name="email" class="form-control auth-input" placeholder="Email" required>

            <input type="password" name="password" class="form-control auth-input" placeholder="Password" required>

            <button class="auth-btn w-100 ">Signup</button>

        </form>

        <p class=" auth-switch">
            Already have an account?
            <a href="/login">Login</a>
        </p>

    </div>

</div>

{% endblock %}
